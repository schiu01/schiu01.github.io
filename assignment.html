<html>
<head>
    <title>Final Assignment - Global Soccer Club representation at World Cup 2026</title>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.js"></script>
<body style="margin: 0">
    <div style="display: flex; padding: 10px; gap: 10px;">
        <div id="narrative_text" style="border: 1px solid #EEEEEE; border-radius: 10px; padding: 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

        </div>
        <div>
            <svg id="graphCanvas"></svg>
        </div>
        <div>
            <svg id="legend"></svg>
        </div>

        
    </div>



<div id="tooltip"></div>
<script>
    /**
    *
    * Author: Suk Ching Steven Chiu
    * Course: CS416 - Data Visualization
    * Purpose: Final Assignment - Narrative Visualization
    * ---
    * This graphic is inspired by NY Times world cup graphic: https://www.nytimes.com/interactive/2014/06/20/sports/worldcup/how-world-cup-players-are-connected.html
    * Original graphic was done in 2014.
    * ---
    * 
    * Date: July, 2026
    * Data Source: https://www.kaggle.com/datasets/mominullptr/fifa-world-cup-2026-dataset
    * Files Used: squads_and_players.csv, player_stats.csv, teams.csv
    * 
    * Club Country Names are retrieved from: https://github.com/openfootball/worldcup.json/blob/master/2026/worldcup.squads.json
    * A number of non-ascii names needed to be remapped manually.
    * 
    **/


    // -- Visualization Parameters --
    // Size of circles calculations based on window sizes..  etc

    var canvas_width = ((window.innerWidth > window.innerHeight) ? window.innerHeight : window.innerWidth) * 0.98;
    var canvas_height = canvas_width ;
    var legend_height = canvas_height ; // same height as graph canvas
    var legend_width = Math.min(300, (window.innerWidth - canvas_width) * 0.8) ; // leave some spacing.

    // this is the outer circle radius, 
    // use 90% of the graphcanvas up to max of 900pixels - otherwise it will just look too big
    //
    var outer_circle_radius = Math.min(900, Math.min((canvas_width * 0.90)/2,400));

    var rect_spacing = 5; // Space between circles   
    
    // Calculate length based on number of teams and spacing
    // circumference of the Big Circle divided by number of teams = Diameter of the circle 
    // Diameter of the circle - Spacing between circles then divide by 2 to get radius
    var team_rect_length =  (((2 * Math.PI * outer_circle_radius) / 48) - rect_spacing)  /2

    var teams_map = new Map(); // Map to hold team data for easy access
    var map_fifa_country = new Map()
    var map_clubs = new Map()
    var max_players_in_club =  0;
    var club_member_count_threshold = 5;
    var top_teams_count = 25;
    var top_players_info = new Map(); // holds top 
    var num_of_top_players_visible = 20;
    var tournament_total_players = 1248 // pre count
    var tournament_total_clubs = 450 ; // precount

    // Previous states is an array of hashmap
    // the hashmap carries type of element - eg. circle, line
    // hash map carries the attributes of those elements
    var previous_states = [] ;
    var highlighting_active = false ; // clicking on the circles activates this to highlight certain information.


    // Define federation colors and names - using pastel colors for better visibility
    // These values are static as there are only these soccer federations in the word.
    var federation_colors = {
        "AFC": "#E0d4e7", // Purple
        "CAF": "#F49595", // Red
        "CONCACAF": "#A9e4de", // Green
        "CONMEBOL": "#f3d17c", // Orange
        "OFC": "#d3d6ce",  // Brown
        "UEFA": "#b0b5ed" // Blue        
        
    };
    var federation_names = {
        "UEFA": "Europe",
        "CONMEBOL": "South America",
        "CONCACAF": "North & Central America",
        "CAF": "Africa",
        "AFC": "Asia",
        "OFC": "Oceania"
    };



    // Positioning of elements:
    var legend_x = 30;
    var legend_y = 40; // y position of legend values
    var legend_circle_radius = 10 ;
    var legend_spacing = 10 ;
    var bubble_canvas_start_y = legend_y + 20 ;

    var legendCanvas = d3.select("#legend")
        .attr("width",legend_width)
        .attr("height", legend_height)
        .append("g")
        .attr("transform", "translate(0, 0)");
    
    // federation legend
    
    var legend = legendCanvas.selectAll("g")
        .data(Object.keys(federation_colors))
        .enter()
        .append("g")
        .attr("transform", "translate(0, 0)");     
    legend.append("rect")
        .attr("x", function(d, i) { return legend_x; })
        .attr("y", function(d, i) { return legend_y + (i * (legend_circle_radius * 2 + legend_spacing))  - legend_spacing; })
        .attr("width", 2*legend_circle_radius)
        .attr("height", 20)
        .attr("alignment-baseline", "middle")
        .attr("fill", function(d) { return federation_colors[d]; });
    legend.append("text")
        .attr("x", function(d, i) { return legend_x + legend_spacing +  (legend_circle_radius * 2) })
        .attr("y", function(d, i) { return legend_y + (i * (legend_circle_radius * 2 + legend_spacing)) ; })
        .text(function(d) { return federation_names[d] + " (" + d + ")"; })
        .attr("alignment-baseline", "middle")
        .style("font-size", "12px")
        .style("font-family", "Arial")
        .style("font-weight", "bold");
    legend.append("text")
        .attr("x",legend_x)
        .attr("y", 20)
        .text("World Soccer Federations")
        .style("font-size", "12px")
        .style("font-family", "Arial")
        .style("font-weight", "bold");
    var tooltip = d3.select("#tooltip")
        .append("div").raise()
        .style("position", "absolute")
        .style("visibility", "hidden")
        .style("background-color", "white")
        .style("font-family","Arial")
        .style("font-size","12px")
        .style("border", "solid")
        .style("border-width", "1px")
        .style("border-radius", "5px")
        .style("padding", "10px")

    // Graph canvas is the main outer canvas 
    var graphCanvas = d3.select("#graphCanvas")
        .attr("width", canvas_width)
        .attr("height", canvas_height)
        .style("border","1px solid #CCCCCC")
        .style("border-radius", "15px")
        .append("g")
        .attr("transform", "translate(0, 0)")
        ;
    // bubble chart canvas is within the graphcanvas, but smaller
    // the idea is to have the teams around the outer circle
    // then the clubs as a bubblechart - based on # of players they send to world cup
    var bubblechartCanvas =  d3.select("#graphCanvas")
        .attr("width", canvas_width)
        .attr("height", canvas_height)
        .style("background-color","#EEEEEE")
        .append("g")
        .attr("transform", "translate(0, 0)")
        ;
    
    // Player canvas is to display the players in the chart.
    var playerCanvas =  d3.select("#graphCanvas")
        .attr("width", canvas_width)
        .attr("height", canvas_height)
        .style("background-color","#EEEEEE")
        .append("g")
        .attr("transform", "translate(0, 0)")
        .raise()
        ;
    


    /**
     *  Helper Function: Reset Elements
     *  changes the elements to its original state - color, visibility etc..
     * 
     * */
    function reset_elements() {
            var club_lines = d3.selectAll("line")
            club_lines
                .attr("stroke-width","1")
                .attr("stroke",  "gray")
                .attr('stroke-opacity',"0.8")
            previous_states.forEach(d => {
                d.elem_type.attr('fill', d.prev_color)
            })
            var club_circles = bubblechartCanvas.selectAll("circle[club_team]")
            club_circles
            .style("visibility","visible")
            var club_texts = d3.selectAll("text[club_team]")
            club_texts
            .style("visibility","visible")
            playerCanvas.selectAll("g[club_team]")
            .style("visibility","visible")

            d3.selectAll("line[fifa_code]")
                .style("visibility","visible")
            
    }
    
    /**
     * 
     *  Helper Function:  Highlight the lines betwen the club circle and the country team circle to identify the players link
     * 
     *  Input Parameters: this identifies where the click is coming from - from club circle (club_team) or from world cup team circle (fifa code)
     *                    - if the click is coming from club_team, then fifa_code will be null and vice versa
     * 
     *  Behaviour: Hide all the other clubs except the one clicked - so it shows clearly the lines and the circle.
     *  Additional Behaviour: display, if exists, any top 10 players of the tournament that belongs to the club.
     * 
     * */
    function activate_by_club(club_team) {
                
            // Set the selected club to be highlighted and increase the radius

            //var all_circles = d3.selectAll("circle[club_team]")
            // Select only circles from bubble chart.
            var all_circles = bubblechartCanvas.selectAll("circle[club_team]")
            all_circles
            .style("visibility", d => { if (d.club_team != club_team) {return  "hidden"}})

            var all_text = d3.selectAll("text[club_team]")
            all_text
            .style("visibility", d => { if (d.club_team != club_team) {return  "hidden"}})


            var club_lines = d3.selectAll("line")
            club_lines
                .attr("stroke-width", d => {
                    var stroke_width = (d.club_team == club_team) ? "2" : "0";
                    return stroke_width
                })
                .attr("stroke", d => {
                    var stroke_color = (d.club_team == club_team) ? "red" : "gray";
                    return stroke_color
                })
                .attr("stroke-opacity",1)

            club_lines.lower()
            //previous_states.push({"elem_type": club_circle, "prev_color": prev_color})

            // show players
            playerCanvas.selectAll("g[club_team]")
                        .style("visibility", d => {if (d[1].club_team != club_team) {return  "hidden"}})
    }

    function activate_by_fifa_code(fifa_code) {

            // this is when the fifa country team circle gets clicked.
            // 1. For all lines, if lines dont have fifa code = to the selected code, hide it
            var club_teams = new Map()

            d3.selectAll("line[fifa_code]")
                .style("visibility", d => { 
                    if(d.teams_fifa_code == fifa_code) {
                        club_teams.set(d.club_team,1)
                        return "visible"
                    } else {
                        return "hidden"
                    }                    
                    //return (d.teams_fifa_code == fifa_code) ? "visible" : "hidden"}
                }
                )
                
            playerCanvas.selectAll("g[fifa_code]")
                .style("visibility", d => { 

                    
                    return (d[1].teams_fifa_code == fifa_code) ? "visible" : "hidden"
                })

            var active_clubs = club_teams.keys().toArray();
            
            bubblechartCanvas.selectAll("circle[club_team]")
                .style("visibility", d => {
                    if(active_clubs.includes(d.club_team)) {
                        return "visible"
                    } else {
                        return "hidden"
                    }
                })
            d3.selectAll("text[club_team]")
                .style("visibility", d => {
                    if(active_clubs.includes(d.club_team)) {
                        return "visible"
                    } else {
                        return "hidden"
                    }
                })



    }


    function highlight_lines_clubs(club_team, fifa_code) {
        highlighting_active = !highlighting_active ;

        if(highlighting_active) {
            if(club_team != undefined) {
                activate_by_club(club_team)

            }
            else {
                activate_by_fifa_code(fifa_code)

            }


            
        }
        else {
            reset_elements()
        }
            
   

    }


    function filter_chart_by_region(region_name) {
        draw_bubble_chart({"mode": "filter_by_region", "region_name": region_name,"show_all_clubs": true})
        return false;

    }

    // paint the teams around the outer circle.

    function draw_worldcup_teams() {
        graphCanvas.exit().remove()
        var wc_teams = d3.csv("WorldCupTeams.csv").then(function(data) {

            var total_teams = data.length;
            var angle_per_team = 2 * Math.PI / total_teams;

            // Draw Teams on top and bottom of rectangle area.

            var top_team_canvas = graphCanvas.append("g")
                .attr("transform", "translate(0, 0)");
            


            var teams_canvas = top_team_canvas.selectAll("g")
                .data(data)
                .enter()
                .append("g")
                .attr("transform", function(d,i) { 
                    var x;
                    var y;
                    x = canvas_width / 2 + outer_circle_radius * Math.cos(i * angle_per_team)
                    y = canvas_height / 2 + outer_circle_radius * Math.sin(i * angle_per_team)
                    teams_map.set(d.fifa_code, {x: x, y: y, team_name: d.team_name, confederation: d.confederation});
                    return "translate(" + x + "," + y + ")";

                })
                .attr("fifa_code", d => d.fifa_code)
                



                teams_canvas.append("rect")
                    .attr("x",Math.floor(-team_rect_length/1.5))
                    .attr("y",Math.floor(-team_rect_length/1.5))
                    .attr("width", 1.5*team_rect_length)
                    .attr("height", 1.5 * team_rect_length)
                    .attr("fill", function(d) { return federation_colors[d.confederation]; })
                    .attr("stroke", "black")
                    .attr("stroke-width", 1).attr("stroke-opacity", 0.8)
                    .attr("alignment-baseline", "middle")
                    .attr("id", function(d) { return "team_" + d.fifa_code; })
                    .attr("rx",5)
                    .attr("ry",5)
                    ;
                
                // Stroke is to create the white border
                // and we'll super impose the text next so the text is clearer to the end user
                teams_canvas.append("text")
                .attr("text-anchor", "middle")
                .attr("alignment-baseline", "middle")
                .style("font-size", "14px")
                .style("font-family", "Arial")
                .style("font-weight", "bold")
                .attr("stroke", "white")
                .attr("stroke-width", 2).attr("stroke-opacity", 0.8)
                .text(function(d,i) { return d.fifa_code; }).raise();

                teams_canvas.append("text")
                .attr("text-anchor", "middle")
                .attr("alignment-baseline", "middle")
                .style("fill", "black")
                .style("font-size", "14px")
                .style("font-family", "Arial")
                .style("font-weight", "bold")
                .text(function(d,i) { return d.fifa_code; })

                teams_canvas.on("mouseover", function(event, d) {
                    d3.select(this).style("cursor", "pointer");                
                    // d3.select(this).raise().select("circle").attr("fill", "orange")
                    //     .transition()
                    //     .duration(300)
                    //     .attr("r", team_rect_length + 20)
                    d3.select(this).select("text")
                        .style("fill", "black")
                        .attr("stroke-width", 2).attr("stroke-opacity", 0.8)
                        .text(function(d,i) { return d.team_name; }).raise();
                    d3.select(this).select("text")
                        .style("fill", "black")
                        .text(function(d,i) { return d.team_name; }).raise();
                    
                })
                teams_canvas.on("mouseout", function(event, d) {
                    d3.select(this).style("cursor", "default");   
                    d3.select(this).select("circle")
                        .attr("fill", function(d) { return federation_colors[d.confederation]; })

                    d3.select(this).select("text")
                        .style("fill", "black")
                        .attr("stroke-width", 2).attr("stroke-opacity", 0.8)
                        .text(function(d,i) { return d.fifa_code; }).raise();

                    d3.select(this).select("text")
                        .style("fill", "black")
                        .text(function(d,i) { return d.fifa_code; }).raise();
                    
                })
                .on("click", function(event, d) { highlight_lines_clubs(undefined, d.fifa_code) })



        });    
    }

    function filter_by_mode(mode, data_tmp) {
        var return_data = [];
        if(mode['mode'] == "filter_by_region" && mode['region_name'] != 'All Regions') {
            //console.log(mode)
            if(mode['show_all_clubs']) { top_teams_count = 100;}
            
            data_tmp.forEach((d,i) => {
                if(d.club_region == mode['region_name']) {
                    return_data.push(d)
                }
            })
        } else {
            return_data = data_tmp
        }

        //console.log(return_data)
        return return_data

    }
    
    
    var regional_narratives = {
        "stat_North_America": "{total_clubs} North American clubs (Major League Soccer and other Central American Leagues) with {total_players} players represented {total_percentage}% of total players in the World Cup.",
        "stat_South_America": "{total_clubs} South American clubs with {total_players} players represented {total_percentage}%. Surprisingly lower than North America's representation. Considering South America is one of Hot-Spots for Soccer",
        "stat_Europe": "Europe has a staggering {total_clubs} club representation with {total_players} players representing {total_percentage}% of total players. Almost every nation has players from a European club, that may indicate the quality of the clubs in terms of competition, training and its facilities.",
        "stat_Asia": "Surprisingly Asia has {total_clubs} clubs represented with {total_players} players. Asia is a very distant 2nd from Europe.",
        "stat_Africa": "{total_clubs} African clubs with {total_players} players; representing {total_percentage}%.",
        "stat_Oceania": "{total_clubs} Oceanian clubs with {total_players} players; representing {total_percentage}%; Mostly providing players to New Zealand and Australia.",
        "stat_All_Regions": "There are 48 nations in the World Cup 2026, represented with {total_players} players; The players belong to one of {total_clubs} professional clubs.",
    }
    
    function draw_bubble_chart(mode) 
    {
        
        bubblechartCanvas.selectAll("g").remove();
        d3.selectAll("line").remove();
        playerCanvas.selectAll("g").remove();
        top_players_info.clear()
        map_fifa_country.clear();
        map_clubs.clear();
        var total_players = 0
        var total_clubs = 0
        
        var wc_data = d3.csv("WorldCupPlayerStats.csv").then(function(data_tmp) {


            // Filter Data based on the mode of operation
            // Default mode == undefined = Normal. show top 25 clubs
            // if filter by region is done, show all clubs but filtered by region.
            // if mode is explore mode, then depends on what is filtered. update the chart.
            var data ;
            if(mode == undefined) { data = data_tmp}
            else { 
                    data = filter_by_mode(mode, data_tmp); 
                    
                }


            // 1. Create 2 Hash Maps
            // - First Hash Map = Key of Fifa Country Code, and value is a List of All Players for that country and their assigned club. Nice to have - goals.
            // - Second Hash Map - Key of Clubb Names, value is list of all players for that club and their assigned country.
            // Above will assist in easy access to values.

            // Sort data by top goal scorers so we can capture the names and annotate them later
            data.sort((a,b) => b.player_stats_goals - a.player_stats_goals).forEach(function(d,i) {
                total_players += 1 
                if(i <= num_of_top_players_visible) {
                    top_players_info.set(d.player_id, d)
                }
                if(map_fifa_country.has(d.teams_fifa_code)) {
                    map_fifa_country.get(d.teams_fifa_code).push({"player_name": d.player_name, "club_team": d.club_team, "player_value": d.market_value_eur * 1.2})
                } else {
                    var player_values = [{"player_name": d.player_name, "club_team": d.club_team, "player_value": d.market_value_eur * 1.2}]
                    map_fifa_country.set(d.teams_fifa_code, player_values)
                }

                if(map_clubs.has(d.club_team)) {
                    map_clubs.get(d.club_team).push({"player_name": d.player_name, "fifa_code": d.teams_fifa_code, "player_value": d.market_value_eur * 1.2, "club_region": d.club_region, "club_country_name": d.club_country_name})

                } else {
                    map_clubs.set(d.club_team, [{"player_name": d.player_name, "fifa_code": d.teams_fifa_code, "player_value": d.market_value_eur * 1.2, "club_region": d.club_region, "club_country_name": d.club_country_name}])


                }
                
            });
            total_clubs = map_clubs.keys().toArray().length;
            console.log("Total Players: " + total_players)
            console.log("Total Clubs: " + total_clubs)
            console.log("Top " + top_teams_count + " Clubs Shown ")
            // Display Stats
            
            if(mode != undefined) {
                if(mode['mode'] == 'filter_by_region') {
                    elem_id = "stat_" + mode['region_name'].replace(" ","_");
                    
                    var elem = d3.select("#" + elem_id)
                    .attr("d1", () => {console.log("test")})
                    .html(total_players + " Players | " + parseInt((total_players / tournament_total_players) * 100) + "%")
                    console.log(elem)

                    var regional_narrative_text = regional_narratives[elem_id]
                    regional_narrative_text = regional_narrative_text.replace("{total_clubs}", total_clubs)
                    regional_narrative_text = regional_narrative_text.replace("{total_players}", total_players)
                    regional_narrative_text = regional_narrative_text.replace("{total_percentage}", parseInt((total_players / tournament_total_players) * 100) )
                    d3.select("#narrative_blurb")
                    .html(regional_narrative_text)
                    // var elem = document.getElementById(elem_id);
                    // elem.innerHTML = total_players + " Players | " + parseInt((total_players / tournament_total_players) * 100) + "%"
                }
                
            }
        
            
            //var filtered_clubs = map_clubs.entries().filter(([club_team, players]) => players.length > club_member_count_threshold);
            var filtered_clubs = new Map([...map_clubs.entries()].sort((a,b) => b[1].length - a[1].length ).slice(0,top_teams_count));
            //console.log( filtered_clubs.entries().toArray())
            
            var arr_filtered_clubs = filtered_clubs.entries().toArray();
            min_players = arr_filtered_clubs[arr_filtered_clubs.length-1][1].length
            max_players_in_club = filtered_clubs.entries().toArray()[0][1].length


            // Bubble sizes
            // The range should be proportionate to size of the big circle
            // 
            var outer_circle_radius_scale = d3.scaleSqrt()
                .domain([Math.ceil(min_players/2), max_players_in_club])
                .range([1, outer_circle_radius/7]); // Adjust the range for desired circle sizes

            const colorScale = d3.scaleSequential()
            .domain([Math.ceil(min_players/2), max_players_in_club]) // Your data's min and max values
            .interpolator(d3.interpolateRgb("lightgray", "darkgreen"));

            // Club's country scale (ordinal)
            var club_regions = ["North America","South America", "Europe","Asia","Africa","Oceania"];
            const schemeColors = [d3.schemeCategory10];        

        const club_cntry_color_scale = d3.scaleOrdinal(d3.schemeCategory10)
            .domain(club_regions);
            // Update Legend
            var legend_club_regions_canvas = legendCanvas.append("g")
            legend_club_regions = legend_club_regions_canvas.selectAll("g")
                    .data(club_regions)
                    .enter()
                    .append("g")
                    .attr("transform", "translate(0,0)");
            var legend_rect_canvas =  legend_club_regions_canvas.append("rect")
                    .attr("width",legend_width-10)
                    .attr("height",(2*legend_circle_radius + legend_spacing) * 16)
                    .attr("stroke","#DDDDDD")
                    .attr("stroke-width",1)
                    .attr("fill","lightgray")
                    .attr("fill-opacity","0.1")
                    .attr("x", 10)
                    .attr("y", 200 + legend_y)
                    .attr("rx",10)
                    .attr("ry",10)
                    .lower()
                legend_club_regions_canvas
                .append("text")
                .attr("fill", "black")
                .attr("x",legend_width / 2)
                .attr("y",legend_y + 200)
                .attr("text-anchor", "middle")
                .style("font-size", "14px")
                .style("font-family", "Arial")
                .style("font-weight", "bold")
                .attr("alignment-baseline", "middle")
                .text("Soccer Club Location")

                legend_club_regions
                    .append("circle")
                    .attr("r","10")
                    .attr("fill", d =>  club_cntry_color_scale(d))
                    .attr("cx", (d,i) => (i > 12) ? legend_x + 150 : legend_x)
                    .attr("cy", (d, i) => { 
                        if(i > 12) {
                            return 250 + legend_y + ((i-13) * (legend_circle_radius * 2 + legend_spacing)) ; 
                        } else {
                            return 250 + legend_y + (i * (legend_circle_radius * 2 + legend_spacing)) ; 
                        }
                    }
                    )

                legend_club_regions
                .append("text")
                .attr("fill", "black")
                .attr("text-anchor", "left")
                .attr("alignment-baseline", "middle")
                .style("font-size", "12px")
                .style("font-family", "Arial")
                .style("font-weight", "bold")
